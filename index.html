<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device_width,initial-scale=1.0">
    <title>
        SCI-CALCULATOR
    </title>
    <style>
            body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2c2c44);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .cal {
        background: #111;
        padding: 20px;
        border-radius: 12px;
        width: 260px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    #num {
        width: 93%;
        height: 50px;
        font-size: 22px;
        text-align: right;
        padding: 8px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    .but {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    .container {
    display: flex;
    flex-direction: column;
    align-items: center;
}


    button {
        padding: 15px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #2e2e2e;
        color: white;
        transition: background 0.2s;
    }

    button:hover {
        background: #444;
    }

    button:nth-child(1) {
        background: #d32f2f;
    }

    button:nth-child(1):hover {
        background: #b71c1c;
    }

    button:last-child {
        background: #1976d2;
        grid-column: span 2;
    }

    button:last-child:hover {
        background: #125aa0;
    }
    h1{
        h1 {
    color: #ffffff;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 2px;
}

    }
    </style>
</head>
<body>
    <div class="container">
    <h1>Calculator</h1>
    <div class="cal">
        <input type="text" id="num">
            <div class="but">
                <button onclick="clearAll()">C</button>
                <button onclick="add('/')">/</button>
                <button onclick="add('*')">*</button>
                <button onclick="add('-')">-</button>

                <button onclick="add('7')">7</button>
                <button onclick="add('8')">8</button>
                <button onclick="add('9')">9</button>
                <button onclick="add('+')">+</button>

                <button onclick="add('4')">4</button>
                <button onclick="add('5')">5</button>
                <button onclick="add('6')">6</button>

                <button onclick="add('1')">1</button>
                <button onclick="add('2')">2</button>
                <button onclick="add('3')">3</button>

                <button onclick="add('0')">0</button>
                <button onclick="add('.')">.</button>
                <button onclick="calc()">=</button>
                <button onclick="backspace()">⌫</button>

            </div>

    </div>
    </div>

</body>


<script>
    let val=document.getElementById('num');
    function add(v)
    {
           
        val.value+=v;
    }
    function clearAll()
    {
        val.value='';
    }
    function calc()
    {
        
        let ans=eval(val.value);
        val.value=ans;
    }
    function backspace()
    {
        val.value=val.value.slice(0,-1);
    }


</script>
